<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ticarima V33</title>
</head>
<body class="bg-dark text-light p-4">
    <h1 class="text-danger">Ticarima V33 - Sabotaj & Casusluk</h1>
    <div id="app" class="container mt-3">
        <button class="btn btn-danger" onclick="sabotage(1)">ZenTech'i Sabote Et (-10% Fiyat)</button>
    </div>
    <script>
        async function sabotage(id) {
            const res = await fetch('../server/sabotage.php', { method: 'POST', body: JSON.stringify({companyId: id}) });
            const data = await res.json();
            alert(data.status === 'sabotaged' ? "Sabotaj başarılı, hisseler çakıldı!" : "Sabotaj başarısız!");
        }
    </script>
</body>
</html>
