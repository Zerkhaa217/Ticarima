<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ticarima V35 - RPG Pro</title>
</head>
<body class="bg-dark text-light p-4">
    <h1 class="text-danger">Ticarima V35 - Hero/Villain Modu</h1>
    <div class="card bg-black p-3 text-center">
        <h3>Karma: <span id="karma-val">0</span></h3>
        <button class="btn btn-outline-success" onclick="activateBuff()">Hızlandırıcı (500 TL)</button>
    </div>
    <script>
        async function activateBuff() {
            await fetch('../server/buffs.php', { method: 'POST' });
            alert("Buff aktif: Üretim %200 arttı!");
        }
        async function getKarma() {
            const res = await fetch('../server/karma.php');
            const data = await res.json();
            document.getElementById('karma-val').innerText = data.karma;
        }
        setInterval(getKarma, 2000);
    </script>
</body>
</html>
