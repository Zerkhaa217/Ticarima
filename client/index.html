<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ticarima V37 - RPG</title>
</head>
<body class="bg-dark text-light p-4">
    <h1 class="text-danger">Ticarima V37 - Global Event System</h1>
    <div id="event-log" class="alert alert-info">Piyasa Olayı Bekleniyor...</div>
    <div class="container mt-3">
        <button class="btn btn-outline-warning" onclick="triggerEncounter()">Rastgele Olay (RPG)</button>
    </div>
    <script>
        async function triggerEncounter() {
            const res = await fetch('../server/random_encounter.php', { method: 'POST' });
            const data = await res.json();
            document.getElementById('event-log').innerText = "Olay: " + data.msg;
            alert("Olay: " + data.msg);
        }
    </script>
</body>
</html>
