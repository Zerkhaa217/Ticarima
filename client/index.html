<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ticarima V38 - RPG/Missions</title>
</head>
<body class="bg-dark text-light p-4">
    <h1 class="text-warning">Ticarima V38 - Görevler & Başarılar</h1>
    <div class="row mt-3">
        <div class="col-md-6" id="quest-log">
            <h3>📖 Görev Listesi</h3>
            <ul class="list-group">
                <li class="list-group-item bg-dark text-light">1.000.000 TL Kasa</li>
                <li class="list-group-item bg-dark text-light">ZenTech'i Sabote Et</li>
            </ul>
        </div>
        <div class="col-md-6" id="achievement-center">
            <h3>🎖️ Başarı Merkezi</h3>
            <button class="btn btn-primary" onclick="checkAchievements()">Rozetleri Kontrol Et</button>
            <div id="badges" class="mt-2"></div>
        </div>
    </div>
    <script>
        async function checkAchievements() {
            const res = await fetch('../server/achievements.php', { method: 'POST' });
            const data = await res.json();
            document.getElementById('badges').innerHTML = data.badges ? data.badges.map(b => `<span class="badge bg-gold">${b}</span>`).join(' ') : "Henüz rozet yok!";
        }
    </script>
</body>
</html>
