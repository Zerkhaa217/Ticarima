<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <title>Ticarima V41 - Private Chat</title>
</head>
<body class="bg-dark text-light p-4">
    <h1 class="text-primary">Ticarima V41 - Private Chat</h1>
    <div id="chat" style="height:200px; overflow-y:scroll; border:1px solid #333" class="mb-2"></div>
    <select id="recipient" class="form-control bg-dark text-white mb-2">
        <option value="">Herkese</option>
    </select>
    <input type="text" id="msgInput" class="form-control bg-dark text-white" placeholder="Mesaj...">
    <button class="btn btn-info mt-2" onclick="send()">Gönder</button>

    <script>
        const socket = io('http://34.57.223.210:3000');
        socket.on('chatMessage', (data) => {
            document.getElementById('chat').innerHTML += `<div><b>${data.user}:</b> ${data.text}</div>`;
        });
        function send() {
            const text = document.getElementById('msgInput').value;
            const to = document.getElementById('recipient').value;
            socket.emit('chatMessage', { user: "Zen", text, to });
            document.getElementById('msgInput').value = "";
        }
    </script>
</body>
</html>
