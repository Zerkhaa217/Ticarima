<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ticarima V24</title>
</head>
<body class="bg-dark text-light p-4">
    <h1 class="text-danger">Ticarima V24 - Piyasa Manipülasyonu</h1>
    <div class="container mt-3">
        <button class="btn btn-outline-danger" onclick="manipulate('Tech')">Tech Sektörünü Çökert (5000 TL)</button>
    </div>
    <script>
        async function manipulate(sector) {
            await fetch('../server/manipulate.php', { method: 'POST', body: JSON.stringify({sector}) });
            alert("Sektör manipüle edildi!");
        }
    </script>
</body>
</html>
