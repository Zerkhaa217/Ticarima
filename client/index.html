<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body class="bg-dark text-light p-4">
    <h1>Ticarima Hybrid</h1>
    <div id="market" class="row"></div>
    <script>
        const socket = io('http://34.57.223.210:3000');
        socket.on('marketUpdate', (comps) => {
            document.getElementById('market').innerHTML = comps.map(c => `
                <div class="col-6 mb-3">
                    <div class="card p-3 bg-secondary">
                        <h5>${c.name}</h5>
                        <p>Fiyat: ${c.price.toFixed(2)} | Stok: ${c.stock}</p>
                        <button class="btn btn-info" onclick="produce(${c.id})">ÜRET</button>
                    </div>
                </div>
            `).join('');
        });
        function produce(id) { socket.emit('produce', id); }
    </script>
</body>
</html>
