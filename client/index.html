<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ticarima V25 - AI Analyst</title>
</head>
<body class="bg-dark text-light p-4">
    <h1 class="text-info">Ticarima V25 - AI Analist</h1>
    <div id="app" class="container mt-3">
        <button class="btn btn-primary" onclick="analyze(1)">ZenTech AI Analizi</button>
        <button class="btn btn-outline-info" onclick="analyze(2)">MedLife AI Analizi</button>
    </div>
    <script>
        async function analyze(id) {
            const res = await fetch('../server/analyze.php', { method: 'POST', body: JSON.stringify({companyId: id}) });
            const data = await res.json();
            alert("Jarvis Tavsiyesi: " + data.advice);
        }
    </script>
</body>
</html>
