<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ticarima V36 - Gamble</title>
</head>
<body class="bg-dark text-light p-4">
    <h1 class="text-danger">Ticarima V36 - Risk & Reward</h1>
    <div class="card bg-secondary p-3">
        <p>Günün Fırsatı: Yatırım yap ve kazan ya da kaybet!</p>
        <button class="btn btn-warning" onclick="gamble('risk')">YÜKSEK RİSK (50% Win/Lose)</button>
        <button class="btn btn-primary" onclick="gamble('safe')">DÜŞÜK RİSK (Garanti)</button>
    </div>
    <script>
        async function gamble(choice) {
            const res = await fetch('../server/events.php', { method: 'POST', body: JSON.stringify({choice}) });
            const data = await res.json();
            alert(data.msg);
        }
    </script>
</body>
</html>
