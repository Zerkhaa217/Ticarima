<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ticarima V26</title>
</head>
<body class="bg-dark text-light p-4">
    <h1 class="text-warning">Ticarima V26 - Gamification Pro</h1>
    <div id="app" class="container mt-3">
        <h4 id="achieve">Görev: 10.000 TL Kasa = Milyoner Rozeti</h4>
        <button class="btn btn-outline-warning" onclick="checkBadge()">Rozet Kontrolü</button>
    </div>
    <script>
        async function checkBadge() {
            const res = await fetch('../server/achievements.php', { method: 'POST' });
            const data = await res.json();
            if (data.badge) alert("ROZET KAZANDIN: " + data.badge);
            else alert("Daha fazla çalış, milyoner ol!");
        }
    </script>
</body>
</html>
