<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ticarima V27 - Black Swan</title>
</head>
<body class="bg-dark text-light p-4">
    <h1 class="text-danger">Ticarima V27 - Piyasa Olayları</h1>
    <div id="event-log" class="alert alert-warning">Piyasa stabil.</div>
    <div class="container mt-3">
        <button class="btn btn-outline-danger" onclick="triggerEvent()">Piyasa Olayı Tetikle</button>
    </div>
    <script>
        async function triggerEvent() {
            const res = await fetch('../server/market_events.php', { method: 'POST' });
            const data = await res.json();
            document.getElementById('event-log').innerText = "Son Olay: " + data.event + " (Etki: " + data.impact + ")";
            alert("Piyasa şokta!");
        }
    </script>
</body>
</html>
