<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ticarima V32 - RPG</title>
</head>
<body class="bg-dark text-light p-4">
    <h1 class="text-primary">Ticarima V32 - RPG Modu</h1>
    <div id="stats" class="container mt-3">
        <button class="btn btn-primary" onclick="unlock()">Teknoloji Ağacı Aç (5000 TL)</button>
        <button class="btn btn-secondary" onclick="collectDaily()">Günlük Ödül</button>
    </div>
    <script>
        async function unlock() {
            await fetch('../server/unlock.php', { method: 'POST' });
            alert("Yeni teknoloji seviyesi açıldı!");
        }
        async function collectDaily() {
            await fetch('../server/daily.php', { method: 'POST' });
            alert("Günlük ödül alındı!");
        }
    </script>
</body>
</html>
