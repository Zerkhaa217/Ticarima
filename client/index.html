<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <title>Ticarima V39 - Global Chat</title>
</head>
<body class="bg-dark text-light p-4">
    <h1 class="text-primary">Ticarima V39 - Global Chat</h1>
    
    <div id="chat" class="bg-black p-3 mb-4" style="height:200px; overflow-y:scroll; border:1px solid #333"></div>
    <input type="text" id="msgInput" class="form-control bg-dark text-white" placeholder="Mesaj yaz...">
    <button class="btn btn-info mt-2" onclick="send()">Gönder</button>

    <script>
        const socket = io('http://34.57.223.210:3000');
        const chat = document.getElementById('chat');
        
        socket.on('chatMessage', (data) => {
            chat.innerHTML += `<div><b>${data.user}:</b> ${data.text} <small class="text-muted">(${data.time})</small></div>`;
            chat.scrollTop = chat.scrollHeight;
        });

        function send() {
            const text = document.getElementById('msgInput').value;
            socket.emit('chatMessage', { user: "Zen", text: text });
            document.getElementById('msgInput').value = "";
        }
    </script>
</body>
</html>
