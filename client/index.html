<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ticarima V44 - Market News</title>
</head>
<body class="bg-dark text-light p-4">
    <h1 class="text-danger">Ticarima V44 - Macro Events</h1>
    <div id="ticker" class="alert alert-warning">Piyasa stabil.</div>
    <div class="container mt-3">
        <button class="btn btn-outline-danger" onclick="triggerNews()">Global Piyasa Olayı</button>
    </div>
    <script>
        async function triggerNews() {
            const res = await fetch('../server/market_news.php', { method: 'POST' });
            const data = await res.json();
            document.getElementById('ticker').innerText = "Son Haber: " + data.news;
            alert("Piyasa Etkisi: " + data.news);
        }
    </script>
</body>
</html>
