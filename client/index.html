<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ticarima V42 - Profil</title>
</head>
<body class="bg-dark text-light p-4">
    <h1 class="text-primary">Ticarima V42 - Profil & Arkadaşlar</h1>
    <div class="row">
        <div class="col-6 bg-black p-3">
            <h3>Profilim</h3>
            <p id="profile-stats">Level: 1 | XP: 0</p>
        </div>
        <div class="col-6 bg-black p-3">
            <h3>Arkadaşlar</h3>
            <ul id="friend-list" class="list-group"></ul>
        </div>
    </div>
    <script>
        async function getFriends() {
            const res = await fetch('../server/friends.php');
            const data = await res.json();
            document.getElementById('friend-list').innerHTML = data.map(f => `<li class="list-group-item bg-dark text-light">${f.username} (Lvl: ${f.level})</li>`).join('');
        }
        getFriends();
    </script>
</body>
</html>
